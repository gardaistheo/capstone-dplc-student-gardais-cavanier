apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "worldcup-app.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "worldcup-app.labels" . | nindent 4 }}
data:
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_USER: {{ .Values.postgresql.user | quote }}
  DB_NAME: {{ .Values.postgresql.database | quote }}
  NODE_ENV: "production"
