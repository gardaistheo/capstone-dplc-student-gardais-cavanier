apiVersion: v1
kind: Service
metadata:
  name: {{ include "worldcup-app.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "worldcup-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  type: {{ .Values.app.service.type }}
  selector:
    {{- include "worldcup-app.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.app.service.port }}
      targetPort: http
      protocol: TCP
      name: http
