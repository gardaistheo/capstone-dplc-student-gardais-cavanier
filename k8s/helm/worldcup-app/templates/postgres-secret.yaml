{{- if and (not .Values.postgresql.existingSecret) (not .Values.postgresql.password) }}
{{- fail "ERROR: Set postgresql.existingSecret (recommended) or postgresql.password. See DEPLOY_VPS.md Step 5." }}
{{- end }}
{{- if not .Values.postgresql.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "worldcup-app.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.postgresql.password | quote }}
{{- end }}
