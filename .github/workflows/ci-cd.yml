name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_REPOSITORY: docker.io/theoga/worldcup-app
  K8S_NAMESPACE: worldcup
  HELM_RELEASE: worldcup

jobs:
  test:
    name: Test Node.js app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    name: Build on VPS and deploy to k3s
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SSH password client
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Package deployment sources
        run: |
          tar \
            --exclude='.git' \
            --exclude='app/node_modules' \
            -czf /tmp/worldcup-deploy.tgz \
            app \
            k8s/helm/worldcup-app

      - name: Configure SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: "22"
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Upload sources to VPS
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: "22"
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -p "$SSH_PASSWORD" scp -P "$SSH_PORT" \
            /tmp/worldcup-deploy.tgz \
            "$SSH_USER@$SSH_HOST:/tmp/worldcup-deploy.tgz"

      - name: Build, push and deploy on VPS
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: "22"
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          IMAGE_TAG="${GITHUB_SHA::12}"

          sshpass -p "$SSH_PASSWORD" ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            IMAGE_REPOSITORY="$IMAGE_REPOSITORY" \
            IMAGE_TAG="$IMAGE_TAG" \
            K8S_NAMESPACE="$K8S_NAMESPACE" \
            HELM_RELEASE="$HELM_RELEASE" \
            SUDO_PASSWORD="$SSH_PASSWORD" \
            'bash -s' <<'REMOTE'
          set -euo pipefail

          sudo_docker() {
            printf '%s\n' "$SUDO_PASSWORD" | sudo -S -p '' env DOCKER_CONFIG="$HOME/.docker" docker "$@"
          }

          WORKDIR="/tmp/worldcup-deploy-${IMAGE_TAG}"
          rm -rf "$WORKDIR"
          mkdir -p "$WORKDIR"
          tar -xzf /tmp/worldcup-deploy.tgz -C "$WORKDIR"
          cd "$WORKDIR"

          sudo_docker build \
            -t "${IMAGE_REPOSITORY}:${IMAGE_TAG}" \
            -t "${IMAGE_REPOSITORY}:latest" \
            ./app

          sudo_docker push "${IMAGE_REPOSITORY}:${IMAGE_TAG}"
          sudo_docker push "${IMAGE_REPOSITORY}:latest"

          if [ -f "$HOME/.kube/config" ]; then
            export KUBECONFIG="$HOME/.kube/config"
          else
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
          fi

          helm upgrade "$HELM_RELEASE" ./k8s/helm/worldcup-app \
            --namespace "$K8S_NAMESPACE" \
            --install \
            --create-namespace \
            --set app.image.repository="$IMAGE_REPOSITORY" \
            --set app.image.tag="$IMAGE_TAG" \
            --set app.image.pullPolicy=IfNotPresent \
            --wait \
            --timeout 5m

          kubectl rollout status deployment/worldcup-app -n "$K8S_NAMESPACE" --timeout=120s
          kubectl get pods -n "$K8S_NAMESPACE"
          curl -fsS --max-time 10 http://127.0.0.1/api/health
          curl -fsS --max-time 10 http://127.0.0.1/api/health/db
          REMOTE
